<section class="host-page">
  <div class="host-card">
    <aside class="host-intro">
      <span class="app-badge">Perfil arrendador</span>
      <h1>Publica un espacio preparado para estudiantes</h1>
      <p>Completa los datos básicos del alojamiento para crear una ficha clara, confiable y fácil de comparar.</p>
    </aside>

    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="host-form">
      <div class="form-grid">
        <div class="app-field">
          <label for="nombre">Nombre</label>
          <input
            id="nombre"
            class="app-input"
            type="text"
            formControlName="nombre"
            placeholder="Ej. María"
            [class.is-error]="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched"
          />
        </div>

        <div class="app-field">
          <label for="apellido">Apellido</label>
          <input
            id="apellido"
            class="app-input"
            type="text"
            formControlName="apellido"
            placeholder="Ej. Gómez"
            [class.is-error]="registroForm.get('apellido')?.invalid && registroForm.get('apellido')?.touched"
          />
        </div>

        <div class="app-field form-span-2">
          <label for="email">Correo electrónico</label>
          <input
            id="email"
            class="app-input"
            type="email"
            formControlName="email"
            placeholder="contacto@correo.com"
            [class.is-error]="registroForm.get('email')?.invalid && registroForm.get('email')?.touched"
          />
          <small class="app-error" *ngIf="registroForm.get('email')?.invalid && registroForm.get('email')?.touched">
            Ingresa un correo electrónico válido.
          </small>
        </div>

        <div class="app-field form-span-2">
          <label for="telefono">Teléfono de contacto</label>
          <input
            id="telefono"
            class="app-input"
            type="tel"
            formControlName="telefono"
            placeholder="987654321"
            [class.is-error]="registroForm.get('telefono')?.invalid && registroForm.get('telefono')?.touched"
          />
        </div>

        <div class="app-field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            class="app-input"
            type="password"
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            [class.is-error]="registroForm.get('password')?.invalid && registroForm.get('password')?.touched"
          />
        </div>

        <div class="app-field">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            id="confirmPassword"
            class="app-input"
            type="password"
            formControlName="confirmPassword"
            placeholder="Repite tu contraseña"
            [class.is-error]="registroForm.hasError('passwordMismatch') && registroForm.get('confirmPassword')?.touched"
          />
        </div>

        <small class="app-error form-span-2" *ngIf="registroForm.hasError('passwordMismatch') && registroForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </small>
      </div>

      <label class="app-checkbox">
        <input type="checkbox" formControlName="terminos" />
        <span>Confirmo que la información del alojamiento es real y acepto los <a href="#" class="app-link">términos</a>.</span>
      </label>

      <div class="app-error-banner" *ngIf="errorMsg()">
        {{ errorMsg() }}
      </div>

      <button
        type="submit"
        class="app-button app-button--primary"
        [disabled]="registroForm.invalid || loading()"
      >
        <span *ngIf="!loading()">Crear perfil arrendador</span>
        <span *ngIf="loading()">Creando perfil…</span>
      </button>

      <p class="host-footer">
        ¿Ya tienes cuenta? <a routerLink="/login" class="app-link">Inicia sesión</a>
      </p>
    </form>
  </div>
</section>
