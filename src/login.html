<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>Bienvenido a <span>EduStay</span></h1>
      <p>Ingresa tus datos para acceder a tu espacio</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="nombre@ejemplo.com"
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <small class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Ingresa un correo electrónico válido.
        </small>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Contraseña</label>
          <a routerLink="/recuperar" class="forgot-password">¿La olvidaste?</a>
        </div>

        <!-- Nuevo contenedor para el input y el botón -->
        <div class="password-container">
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="••••••••"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <!-- Botón para mostrar/ocultar -->
          <button type="button" class="btn-toggle-password" (click)="togglePassword()">
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>

        <small class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña debe tener al menos 6 caracteres.
        </small>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe">
          <span>Recordar sesión</span>
        </label>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
        Iniciar sesión
      </button>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate gratis</a></p>
    </div>
  </div>
</div>
