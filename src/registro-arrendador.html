<div class="registro-wrapper">
  <div class="registro-card">
    <div class="registro-header">
      <h1>Crea tu cuenta <br><span>Arrendador</span></h1>
      <p>Publica tus habitaciones y conecta con estudiantes.</p>
    </div>

    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="registro-form">

      <!-- Nombre Completo -->
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input id="nombre" type="text" formControlName="nombre" placeholder="Ej. María López"
          [class.input-error]="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched">
        <small class="error-text" *ngIf="registroForm.get('nombre')?.invalid && registroForm.get('nombre')?.touched">
          El nombre es obligatorio.
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="maria@email.com"
          [class.input-error]="registroForm.get('email')?.invalid && registroForm.get('email')?.touched">
        <small class="error-text" *ngIf="registroForm.get('email')?.invalid && registroForm.get('email')?.touched">
          Ingresa un correo electrónico válido.
        </small>
      </div>

      <!-- Teléfono y Dirección en fila -->
      <div class="form-row">
        <div class="form-group">
          <label for="telefono">Teléfono de Contacto</label>
          <input id="telefono" type="text" formControlName="telefono" placeholder="987654321"
            [class.input-error]="registroForm.get('telefono')?.invalid && registroForm.get('telefono')?.touched">
        </div>
        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input id="direccion" type="text" formControlName="direccion" placeholder="Av. Ejemplo 123"
            [class.input-error]="registroForm.get('direccion')?.invalid && registroForm.get('direccion')?.touched">
        </div>
      </div>

      <!-- Contraseñas -->
      <div class="form-row">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-container">
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
              [class.input-error]="registroForm.get('password')?.invalid && registroForm.get('password')?.touched">
            <button type="button" class="btn-toggle-password" (click)="togglePassword()">
              {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirmar</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••"
            [class.input-error]="registroForm.hasError('passwordMismatch') && registroForm.get('confirmPassword')?.touched">
        </div>
      </div>
      <small class="error-text" *ngIf="registroForm.hasError('passwordMismatch') && registroForm.get('confirmPassword')?.touched">
        Las contraseñas no coinciden.
      </small>

      <!-- Términos -->
      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="terminos">
          <span>Acepto los <a href="#">Términos y Condiciones</a></span>
        </label>
      </div>

      <button type="submit" class="btn-submit" [disabled]="registroForm.invalid">
        Finalizar Registro
      </button>
    </form>

    <div class="registro-footer">
      <p><a routerLink="/registro">← Volver</a></p>
    </div>
  </div>
</div>
