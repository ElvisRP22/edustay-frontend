<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" style="background:#fff;font-family:'Segoe UI','Inter',system-ui,sans-serif;font-size:12px;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ROW 1: Usuario (center-left) + Habitacion (center-right) -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Usuario Box -->
  <g filter="url(#shadow)">
    <rect x="30" y="20" width="260" height="290" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="30" y="20" width="260" height="32" rx="10" fill="#3b82f6"/>
    <rect x="30" y="42" width="260" height="10" fill="#3b82f6"/>
    <text x="160" y="42" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">Usuario</text>
    <text x="44" y="74" fill="#334155" font-size="11">+Long id</text>
    <text x="44" y="94" fill="#334155" font-size="11">+String nombre</text>
    <text x="44" y="114" fill="#334155" font-size="11">+String apellido</text>
    <text x="44" y="134" fill="#334155" font-size="11">+String email</text>
    <text x="44" y="154" fill="#334155" font-size="11">+String telefono</text>
    <text x="44" y="174" fill="#334155" font-size="11">+String dni</text>
    <text x="44" y="194" fill="#334155" font-size="11">+UserRole rol</text>
    <text x="44" y="214" fill="#334155" font-size="11">+boolean emailVerificado</text>
    <text x="44" y="234" fill="#334155" font-size="11">+VerificationStatus identidadVerificada</text>
    <text x="44" y="254" fill="#334155" font-size="11">+LocalDateTime fechaRegistro</text>
    <line x1="30" y1="62" x2="290" y2="62" stroke="#3b82f6" stroke-width="0.5"/>
  </g>

  <!-- Habitacion Box -->
  <g filter="url(#shadow)">
    <rect x="580" y="20" width="260" height="290" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="580" y="20" width="260" height="32" rx="10" fill="#22c55e"/>
    <rect x="580" y="42" width="260" height="10" fill="#22c55e"/>
    <text x="710" y="42" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">Habitacion</text>
    <text x="594" y="74" fill="#334155" font-size="11">+Long id</text>
    <text x="594" y="94" fill="#334155" font-size="11">+String titulo</text>
    <text x="594" y="114" fill="#334155" font-size="11">+String descripcion</text>
    <text x="594" y="134" fill="#334155" font-size="11">+Double precio</text>
    <text x="594" y="154" fill="#334155" font-size="11">+String direccion</text>
    <text x="594" y="174" fill="#334155" font-size="11">+Integer distanciaUtpMinutos</text>
    <text x="594" y="194" fill="#334155" font-size="11">+Double latitud</text>
    <text x="594" y="214" fill="#334155" font-size="11">+Double longitud</text>
    <text x="594" y="234" fill="#334155" font-size="11">+RoomStatus estado</text>
    <text x="594" y="254" fill="#334155" font-size="11">+LocalDateTime fechaPublicacion</text>
    <line x1="580" y1="62" x2="840" y2="62" stroke="#22c55e" stroke-width="0.5"/>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ROW 1 RELATIONSHIP: Usuario 1 --> 0..* Habitacion -->
  <!-- ════════════════════════════════════════════════════════ -->
  <line x1="290" y1="165" x2="580" y2="165" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="380" y="152" width="70" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="415" y="164" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">publica</text>
  <text x="298" y="161" fill="#3b82f6" font-size="10" font-weight="700">1</text>
  <text x="562" y="161" fill="#22c55e" font-size="10" font-weight="700">0..*</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ROW 2: DocVerif (left) | AlquilerActivo (center-left) | Mensaje (center-right) | Reseña (right) -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- DocumentoVerificacion Box -->
  <g filter="url(#shadow)">
    <rect x="10" y="400" width="230" height="200" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
    <rect x="10" y="400" width="230" height="32" rx="10" fill="#eab308"/>
    <rect x="10" y="422" width="230" height="10" fill="#eab308"/>
    <text x="125" y="422" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">DocumentoVerificacion</text>
    <text x="24" y="452" fill="#334155" font-size="11">+Long id</text>
    <text x="24" y="472" fill="#334155" font-size="11">+DocType tipo</text>
    <text x="24" y="492" fill="#334155" font-size="11">+String archivoUrl</text>
    <text x="24" y="512" fill="#334155" font-size="11">+LocalDateTime fechaSubida</text>
    <text x="24" y="532" fill="#334155" font-size="11">+VerificationStatus estado</text>
    <line x1="10" y1="440" x2="240" y2="440" stroke="#eab308" stroke-width="0.5"/>
  </g>

  <!-- AlquilerActivo Box -->
  <g filter="url(#shadow)">
    <rect x="270" y="400" width="230" height="200" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="270" y="400" width="230" height="32" rx="10" fill="#ec4899"/>
    <rect x="270" y="422" width="230" height="10" fill="#ec4899"/>
    <text x="385" y="422" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">AlquilerActivo</text>
    <text x="284" y="452" fill="#334155" font-size="11">+Long id</text>
    <text x="284" y="472" fill="#334155" font-size="11">+LocalDateTime fechaInicio</text>
    <text x="284" y="492" fill="#334155" font-size="11">+Double montoPactado</text>
    <text x="284" y="512" fill="#334155" font-size="11">+String contratoUrl</text>
    <text x="284" y="532" fill="#334155" font-size="11">+LocalDateTime fechaRegistro</text>
    <line x1="270" y1="440" x2="500" y2="440" stroke="#ec4899" stroke-width="0.5"/>
  </g>

  <!-- Mensaje Box -->
  <g filter="url(#shadow)">
    <rect x="530" y="400" width="240" height="220" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <rect x="530" y="400" width="240" height="32" rx="10" fill="#a855f7"/>
    <rect x="530" y="422" width="240" height="10" fill="#a855f7"/>
    <text x="650" y="422" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">Mensaje</text>
    <text x="544" y="452" fill="#334155" font-size="11">+Long id</text>
    <text x="544" y="472" fill="#334155" font-size="11">+String contenido</text>
    <text x="544" y="492" fill="#334155" font-size="11">+boolean leido</text>
    <text x="544" y="512" fill="#334155" font-size="11">+boolean moderado</text>
    <text x="544" y="532" fill="#334155" font-size="11">+String categoriaModeracion</text>
    <text x="544" y="552" fill="#334155" font-size="11">+boolean bloqueado</text>
    <text x="544" y="572" fill="#334155" font-size="11">+LocalDateTime fechaEnvio</text>
    <line x1="530" y1="440" x2="770" y2="440" stroke="#a855f7" stroke-width="0.5"/>
  </g>

  <!-- Resena Box -->
  <g filter="url(#shadow)">
    <rect x="800" y="400" width="230" height="180" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
    <rect x="800" y="400" width="230" height="32" rx="10" fill="#f43f5e"/>
    <rect x="800" y="422" width="230" height="10" fill="#f43f5e"/>
    <text x="915" y="422" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">Resena</text>
    <text x="814" y="452" fill="#334155" font-size="11">+Long id</text>
    <text x="814" y="472" fill="#334155" font-size="11">+Integer calificacion</text>
    <text x="814" y="492" fill="#334155" font-size="11">+String comentario</text>
    <text x="814" y="512" fill="#334155" font-size="11">+LocalDateTime fechaCreacion</text>
    <line x1="800" y1="440" x2="1030" y2="440" stroke="#f43f5e" stroke-width="0.5"/>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- RELATIONSHIPS: ROW 1 → ROW 2 (all lines go straight down, no crossing) -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Usuario → DocumentoVerificacion (straight down left) -->
  <line x1="100" y1="310" x2="100" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="64" y="345" width="46" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="87" y="358" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">sube</text>
  <text x="106" y="322" fill="#3b82f6" font-size="10" font-weight="700">1</text>
  <text x="106" y="396" fill="#eab308" font-size="10" font-weight="700">0..*</text>

  <!-- Usuario → AlquilerActivo (down to center-left) -->
  <line x1="210" y1="310" x2="340" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="230" y="343" width="66" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="263" y="355" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">arrienda</text>
  <text x="206" y="322" fill="#3b82f6" font-size="10" font-weight="700">1</text>
  <text x="328" y="396" fill="#ec4899" font-size="10" font-weight="700">0..*</text>

  <!-- Habitacion → AlquilerActivo (down to center-left) -->
  <line x1="640" y1="310" x2="450" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="510" y="343" width="60" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="540" y="355" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">vincula</text>
  <text x="636" y="322" fill="#22c55e" font-size="10" font-weight="700">1</text>
  <text x="456" y="396" fill="#ec4899" font-size="10" font-weight="700">0..1</text>

  <!-- Usuario → Mensaje (down to center-right, slight curve) -->
  <path d="M 270,310 Q 420,370 580,430" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="380" y="358" width="52" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="406" y="370" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">emite</text>
  <text x="276" y="322" fill="#3b82f6" font-size="10" font-weight="700">1</text>
  <text x="566" y="426" fill="#a855f7" font-size="10" font-weight="700">0..*</text>

  <!-- Habitacion → Mensaje (straight down) -->
  <line x1="680" y1="310" x2="680" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="688" y="345" width="90" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="733" y="358" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">contextualiza</text>
  <text x="674" y="322" fill="#22c55e" font-size="10" font-weight="700">1</text>
  <text x="674" y="396" fill="#a855f7" font-size="10" font-weight="700">0..*</text>

  <!-- Usuario → Reseña (curve far right, goes over) -->
  <path d="M 285,280 Q 550,320 850,400" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="550" y="300" width="58" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="579" y="312" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">escribe</text>
  <text x="290" y="275" fill="#3b82f6" font-size="10" font-weight="700">1</text>
  <text x="836" y="396" fill="#f43f5e" font-size="10" font-weight="700">0..*</text>

  <!-- Habitacion → Reseña (straight down right) -->
  <line x1="800" y1="310" x2="880" y2="400" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="830" y="345" width="52" height="18" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="856" y="358" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">recibe</text>
  <text x="796" y="322" fill="#22c55e" font-size="10" font-weight="700">1</text>
  <text x="886" y="396" fill="#f43f5e" font-size="10" font-weight="700">0..*</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g transform="translate(20,665)">
    <text fill="#94a3b8" font-size="10" font-weight="600">EduStay · Modelo Entidad-Relación · JPA / Hibernate · Spring Boot 3</text>
  </g>
</svg>